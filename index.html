<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variance & Excel Formula Calculator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
            color: #333;
        }
        h1 { color: #24292e; }
        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            background-color: #2ea44f;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background-color: #2c974b; }
        .stats-summary {
            background: #f6f8fa;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            font-size: 18px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #e1e4e8;
            padding: 12px;
            text-align: right;
        }
        th {
            background-color: #f6f8fa;
            font-weight: 600;
        }
        td.formula-cell {
            text-align: left;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            background-color: #f6f8fa;
            color: #cf222e;
            font-size: 13px;
        }
        tr:nth-child(even) { background-color: #fcfcfc; }
    </style>
</head>
<body>

    <h1>Excel Number Cruncher & Formula Generator</h1>
    <p>Paste your data from Excel below. The app will calculate the values and show you the exact Excel formulas to use.</p>
    
    <textarea id="dataInput" placeholder="Paste Excel data here..."></textarea>
    <br>
    <button onclick="calculateStats()">Calculate & Generate Formulas</button>

    <div id="summary" class="stats-summary" style="display:none;"></div>

    <table id="resultTable" style="display:none;">
        <thead>
            <tr>
                <th>Row (i)</th>
                <th>Value ($X_i$)</th>
                <th>Deviation ($X_i - \bar{X}$)</th>
                <th>Squared Deviation ($(X_i - \bar{X})^2$)</th>
                <th style="text-align: left;">Excel Formula (Assuming Col A)</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        function calculateStats() {
            const rawInput = document.getElementById('dataInput').value;
            
            // Extract all actual digits, ignoring the internal commas
            const matches = rawInput.match(/\d{1,3}(,\d{3})*|\d+/g);
            
            if (!matches) {
                alert("Please paste some valid numbers!");
                return;
            }

            const parsedNumbers = matches.map(num => parseFloat(num.replace(/,/g, '')));
            const n = parsedNumbers.length;
            const sum = parsedNumbers.reduce((a, b) => a + b, 0);
            const mean = sum / n;

            // Update Summary UI (Fixed the X-bar entity symbol too!)
            const summaryDiv = document.getElementById('summary');
            summaryDiv.style.display = 'block';
            summaryDiv.innerHTML = `<strong>Count (n):</strong> ${n} | <strong>Mean (&#175;X):</strong> ${mean.toLocaleString(undefined, {maximumFractionDigits: 4})}`;

            // Build Table Rows
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = ''; 

            parsedNumbers.forEach((xi, index) => {
                const deviation = xi - mean;
                const squaredDeviation = Math.pow(deviation, 2);
                
                // Excel row indexes typically start at 1
                const excelRow = index + 1; 

                // Generate the dynamic Excel formula string for this row
                const excelFormula = `=(([A${excelRow}] - AVERAGE($A$1:$A$${n}))^2)`;

                const row = `<tr>
                    <td>${excelRow}</td>
                    <td>${xi.toLocaleString()}</td>
                    <td>${deviation.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 4})}</td>
                    <td>${squaredDeviation.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 4})}</td>
                    <td class="formula-cell">=(A${excelRow} - AVERAGE($A$1:$A$${n}))^2</td>
                </tr>`;
                tbody.insertAdjacentHTML('beforeend', row);
            });

            // Show Table
            document.getElementById('resultTable').style.display = 'table';
        }
    </script>

</body>
</html>
