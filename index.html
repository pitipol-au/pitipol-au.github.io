<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variance Calculator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            color: #333;
        }
        h1 { color: #24292e; }
        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            background-color: #2ea44f;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background-color: #2c974b; }
        .stats-summary {
            background: #f6f8fa;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            font-size: 18px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #e1e4e8;
            padding: 12px;
            text-align: right;
        }
        th {
            background-color: #f6f8fa;
            font-weight: 600;
        }
        tr:nth-child(even) { background-color: #fcfcfc; }
    </style>
</head>
<body>

    <h1>Excel Number Cruncher</h1>
    <p>Paste your data from Excel below. (Accepts raw columns, spaces, or numbers clumped with commas).</p>
    
    <textarea id="dataInput" placeholder="Paste Excel data here..."></textarea>
    <br>
    <button onclick="calculateStats()">Calculate</button>

    <div id="summary" class="stats-summary" style="display:none;"></div>

    <table id="resultTable" style="display:none;">
        <thead>
            <tr>
                <th>i</th>
                <th>Value ($X_i$)</th>
                <th>Deviation ($X_i - \bar{X}$)</th>
                <th>Squared Deviation ($(X_i - \bar{X})^2$)</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        function calculateStats() {
            const rawInput = document.getElementById('dataInput').value;
            
            // Regex magic: This finds patterns where a number sequence ends and another starts, 
            // or handles standard spaces/newlines from normal excel sheets.
            // It breaks down your clumped example cleanly.
            let cleanText = rawInput.replace(/(\d{3})(?=\d)/g, '$1 ');
            
            // Extract all actual digits, ignoring the internal commas
            const numbers = [];
            // Match numbers that might contain commas inside them
            const matches = rawInput.match(/\d{1,3}(,\d{3})*|\d+/g);
            
            if (!matches) {
                alert("Please paste some valid numbers!");
                return;
            }

            const parsedNumbers = matches.map(num => parseFloat(num.replace(/,/g, '')));

            // 1. Calculate Mean (X-bar)
            const n = parsedNumbers.length;
            const sum = parsedNumbers.reduce((a, b) => a + b, 0);
            const mean = sum / n;

            // Update Summary UI
            const summaryDiv = document.getElementById('summary');
            summaryDiv.style.display = 'block';
            summaryDiv.innerHTML = `<strong>Count (n):</strong> ${n} | <strong>Mean (&bar{X}):</strong> ${mean.toLocaleString(undefined, {maximumFractionDigits: 4})}`;

            // 2. Build Table Rows
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = ''; // Clear old data

            parsedNumbers.forEach((xi, index) => {
                const deviation = xi - mean;
                const squaredDeviation = Math.pow(deviation, 2);

                const row = `<tr>
                    <td>${index + 1}</td>
                    <td>${xi.toLocaleString()}</td>
                    <td>${deviation.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 4})}</td>
                    <td>${squaredDeviation.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 4})}</td>
                </tr>`;
                tbody.insertAdjacentHTML('beforeend', row);
            });

            // Show Table
            document.getElementById('resultTable').style.display = 'table';
        }
    </script>

</body>
</html>
